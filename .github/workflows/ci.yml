name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=agents --cov=twin --cov=simulation --cov=orchestrator --cov=api --cov=debate --cov=services --cov-report=term-missing --cov-report=html --cov-fail-under=20

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 agents/ twin/ simulation/ orchestrator/ api/ debate/ services/ \
            --max-line-length=150 \
            --ignore=E501,W503,E402,W293,W391,W504,E241,E261,E302,E303,E305,E226,F401,F541,F841 \
            --count --statistics

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SECURITY.md exists
        run: test -f SECURITY.md

      - name: Verify security.txt exists
        run: test -f .well-known/security.txt

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "GEMINI_API_KEY\s*=\s*['\"]AIza" --include="*.py" .; then
            echo "ERROR: Hardcoded API keys detected!"
            exit 1
          fi
          echo "No hardcoded secrets found."
