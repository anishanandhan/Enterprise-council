// ── Custom Typewriter Hook ───────────────────────────────────────
function useTypewriter(text, speed = 38, startDelay = 600) {
    const [displayed, setDisplayed] = useState("");
    const [done, setDone] = useState(false);

    useEffect(() => {
        let index = 0;
        let intervalId = null;

        const startTimeout = setTimeout(() => {
            intervalId = setInterval(() => {
                setDisplayed((prev) => {
                    if (index >= text.length) {
                        setDone(true);
                        clearInterval(intervalId);
                        return prev;
                    }
                    const nextChar = text[index];
                    index++;
                    return prev + nextChar;
                });
            }, speed);
        }, startDelay);

        return () => {
            clearTimeout(startTimeout);
            if (intervalId) clearInterval(intervalId);
        };
    }, [text, speed, startDelay]);

    return { displayed, done };
}

// ── Interactive Digital Twin SVG Graph Component ──────────────────
function DigitalTwinGraph({ twin, incident }) {
    if (!twin || !twin.nodes || twin.nodes.length === 0) {
        return (
            <div className="flex flex-col items-center justify-center h-[240px] text-xs text-[#64748B]">
                No digital twin topology sync. Run pipeline to fetch twin logs.
            </div>
        );
    }

    const width = 450;
    const height = 240;
    const centerX = width / 2;
    const centerY = height / 2;

    const userNode = twin.nodes.find(n => n.id === incident.user) || twin.nodes[0];
    const otherNodes = twin.nodes.filter(n => n.id !== userNode.id);

    const nodeCoords = {};
    nodeCoords[userNode.id] = { x: centerX, y: centerY };

    const typeRadii = {
        "Alert": 55,
        "Device": 85,
        "Department": 85,
        "Service": 115,
        "Database": 115,
        "Policy": 140,
        "Unknown": 140
    };

    const nodesByType = {};
    otherNodes.forEach(node => {
        const t = node.type || "Unknown";
        if (!nodesByType[t]) nodesByType[t] = [];
        nodesByType[t].push(node);
    });

    Object.keys(nodesByType).forEach(type => {
        const typeNodes = nodesByType[type];
        const radius = typeRadii[type] || 115;
        const count = typeNodes.length;
        typeNodes.forEach((node, idx) => {
            const angleOffset = {
                "Alert": 0,
                "Device": Math.PI / 6,
                "Department": -Math.PI / 6,
                "Service": Math.PI / 4,
                "Database": -Math.PI / 4,
                "Policy": Math.PI / 2
            }[type] || 0;
            const angle = (idx * 2 * Math.PI) / count + angleOffset;
            nodeCoords[node.id] = {
                x: centerX + radius * Math.cos(angle) * 1.25,
                y: centerY + radius * Math.sin(angle) * 0.9
            };
        });
    });

    const getNodeColor = (type) => {
        switch (type) {
            case "User": return "#FF4D4D";
            case "Service":
            case "Database": return "#FFA500";
            case "Department": return "#00B4D8";
            case "Alert": return "#7B2FBE";
            case "Device": return "#FFFFFF";
            case "Policy": return "#00C896";
            default: return "#00C896";
        }
    };

    const [hoveredNode, setHoveredNode] = useState(null);

    return (
        <div className="relative w-full h-[240px] bg-[#0A0E1A] rounded-lg border border-[#1E293B] overflow-hidden flex items-center justify-center">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                {twin.edges.map((edge, idx) => {
                    const src = nodeCoords[edge.source];
                    const tgt = nodeCoords[edge.target];
                    if (!src || !tgt) return null;
                    return (
                        <line
                            key={`edge-${idx}`}
                            x1={src.x}
                            y1={src.y}
                            x2={tgt.x}
                            y2={tgt.y}
                            stroke="#334155"
                            strokeWidth="1.2"
                            strokeOpacity="0.75"
                        />
                    );
                })}

                {twin.nodes.map((node) => {
                    const coords = nodeCoords[node.id];
                    if (!coords) return null;
                    const isUser = node.id === userNode.id;
                    const isHovered = hoveredNode && hoveredNode.id === node.id;
                    return (
                        <g key={node.id} className="cursor-pointer">
                            <circle
                                cx={coords.x}
                                cy={coords.y}
                                r={isUser ? 9 : isHovered ? 7 : 5}
                                fill={getNodeColor(node.type)}
                                stroke="#0F172A"
                                strokeWidth="1.5"
                                onMouseEnter={() => setHoveredNode(node)}
                                onMouseLeave={() => setHoveredNode(null)}
                            />
                            <text
                                x={coords.x}
                                y={coords.y - 9}
                                textAnchor="middle"
                                fill="#E2E8F0"
                                fontSize="7px"
                                fontFamily="monospace"
                                fontWeight="bold"
                                className="pointer-events-none"
                            >
                                {node.id}
                            </text>
                        </g>
                    );
                })}
            </svg>

            {hoveredNode && (
                <div className="absolute bottom-2 left-2 bg-[#1E293B] border border-primary/40 rounded px-2 py-1 text-[9px] font-mono text-left z-20 shadow-xl max-w-[200px]">
                    <div className="text-white font-bold">{hoveredNode.id}</div>
                    <div className="text-[#94A3B8]">Entity: {hoveredNode.type}</div>
                    <div className="text-[#94A3B8]">Criticality: <span className="text-[#7B2FBE] font-bold">{hoveredNode.criticality}</span></div>
                </div>
            )}
        </div>
    );
}

        } else {

        }

    useEffect(() => {
        const checkHealth = async () => {
            try {
                const r = await fetch(`${apiHost}/api/v1/health`);
                if (r.ok) {
                    const data = await r.json();
                    setApiOnline(true);
                    setApiDetails({
                        splunk_connected: data.splunk_connected,
                        splunk_mode: data.splunk_mode
                    });
                } else {
                    setApiOnline(false);
                }
            } catch (e) {
                setApiOnline(false);
            }
        };
        checkHealth();
    }, []);

    const selectIncident = (inc) => {
        setSelectedIncidentId(inc.id);
        setUserInput(inc.user);
        setEventInput(inc.event);
        setSeverityInput(inc.severity);
    };

    const runPipeline = async () => {
        if (auth.rbacRole === "Auditor") return;

        setPipelineRunning(true);
        setResult(null);
        setChecklistStep(1);
        
        startTimeRef.current = Date.now();
        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
            const elapsed = Date.now() - startTimeRef.current;
            const secs = Math.floor(elapsed / 1000) % 60;
            const mins = Math.floor(elapsed / 60000) % 60;
            const hrs = Math.floor(elapsed / 3600000);
            const pad = (n) => n < 10 ? '0' + n : n;
            setTimeElapsed(`${pad(hrs)}:${pad(mins)}:${pad(secs)}`);
        }, 1000);

        const steps = [
            { step: 1, delay: 500 },
            { step: 2, delay: 500 },
            { step: 3, delay: 500 },
            { step: 4, delay: 500 },
            { step: 5, delay: 500 },
            { step: 6, delay: 500 },
            { step: 7, delay: 500 }
        ];

        for (let i = 0; i < steps.length; i++) {
            await new Promise(r => setTimeout(r, steps[i].delay));
            setChecklistStep(steps[i].step + 1);
        }

        try {
            const response = await fetch(`${apiHost}/api/v1/analyze`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user: userInput,
                    event: eventInput,
                    severity: severityInput
                })
            });
            if (response.ok) {
                const data = await response.json();
                setResult(data);
                setChecklistStep(8);
            } else {
                alert("Pipeline execution failed: " + response.statusText);
                clearInterval(timerRef.current);
                setPipelineRunning(false);
                setChecklistStep(0);
            }
        } catch (err) {
            alert("Network error: " + err.message);
            clearInterval(timerRef.current);
            setPipelineRunning(false);
            setChecklistStep(0);
        }
    };

    const checkExecutionPermission = (action) => {
        const role = auth.rbacRole;
        if (role === "CISO") return { allowed: true, msg: "" };
        if (role === "SOC Manager") {
            if (action === "block_user") {
                return { allowed: false, msg: "SOC Managers are not authorized to block core users. Security exception escalated to CISO." };
            }
            return { allowed: true, msg: "" };
        }
        return { allowed: false, msg: "SOC Analysts/Auditors are not authorized. Incident must be escalated to SOC Manager or CISO." };
    };

    const executeResponse = (action) => {
        const check = checkExecutionPermission(action);
        if (!check.allowed) {
            setPermissionMessage(check.msg);

        setPermissionMessage("");

                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `incident_report_${result.incident.user.toLowerCase()}_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } else {
                alert("PDF generation failed on backend.");
            }

            alert("Error calling report endpoint: " + e.message);

            // Desktop Mouse Video Scrubbing Hook
            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                const handleMouseMove = (e) => {
                    if (window.innerWidth < 1024) return; // Ignore on mobile
                    if (!video.duration) return;

                    if (prevX.current === null) {
                        prevX.current = e.clientX;
                        return;
                    }

                    const deltaX = e.clientX - prevX.current;
                    prevX.current = e.clientX;

                    // Scrub delta logic
                    const timeDelta = (deltaX / window.innerWidth) * 0.8 * video.duration;
                    let targetTime = video.currentTime + timeDelta;
                    targetTime = Math.max(0, Math.min(video.duration, targetTime));

                    video.currentTime = targetTime;
