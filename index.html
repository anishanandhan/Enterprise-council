        // ── Custom Typewriter Hook ───────────────────────────────────────
        function useTypewriter(text, speed = 38, startDelay = 600) {
            const [displayed, setDisplayed] = useState("");
            const [done, setDone] = useState(false);

            useEffect(() => {
                let index = 0;
                let intervalId = null;

                const startTimeout = setTimeout(() => {
                    intervalId = setInterval(() => {
                        setDisplayed((prev) => {
                            if (index >= text.length) {
                                setDone(true);
                                clearInterval(intervalId);
                                return prev;
                            }
                            const nextChar = text[index];
                            index++;
                            return prev + nextChar;
                        });
                    }, speed);
                }, startDelay);

                return () => {
                    clearTimeout(startTimeout);
                    if (intervalId) clearInterval(intervalId);
                };
            }, [text, speed, startDelay]);

            return { displayed, done };
        }

        // ── Main App Component ───────────────────────────────────────────
        function App() {
            const [scrollY, setScrollY] = useState(0);
            const [selectedAgents, setSelectedAgents] = useState([]);

            const prevX = useRef(null);
            const isProd = typeof window !== 'undefined' && (window.location.hostname.includes("web.app") || window.location.hostname.includes("firebaseapp.com"));
            const defaultUrl = isProd ? "https://enterprise-council-ai.streamlit.app/?page=auth" : "http://localhost:8502/?page=auth";
            const [dashboardUrl, setDashboardUrl] = useState(defaultUrl);
            const [linkTarget, setLinkTarget] = useState("_top");

            // States for Loader and Cookie Banner
            const [loading, setLoading] = useState(true);
            const [cookieAccepted, setCookieAccepted] = useState(true);

            const launchDashboard = (e) => {
                if (e) e.preventDefault();
                if (window.self !== window.top) {
                    window.open(dashboardUrl, "_blank");
                } else {
                    window.top.location.href = dashboardUrl;
                }
            };

            useEffect(() => {
                // Determine link target target dynamically to bypass sandbox top navigation restriction
                if (window.self !== window.top) {
                    setLinkTarget("_blank");
                }

                // Check cookie consent
                const consent = localStorage.getItem("cookie_consent");
                if (!consent) {
                    setCookieAccepted(false);
                }

                // Skeleton Loader Timer (moves to next in 1 second)
                const timer = setTimeout(() => {
                    setLoading(false);
                }, 1000);

                let parentOrigin = "http://localhost:8502";
                if (window.location.hostname.includes("web.app") || window.location.hostname.includes("firebaseapp.com")) {
                    parentOrigin = "https://enterprise-council-ai.streamlit.app";
                } else if (window.location.hostname === "127.0.0.1") {
                    parentOrigin = "http://127.0.0.1:8502";
                }
                const urlParams = new URLSearchParams(window.location.search);
                const queryOrigin = urlParams.get("streamlit_origin");
                if (queryOrigin) {
                    parentOrigin = queryOrigin;
                } else if (document.referrer) {
                    try {
                        parentOrigin = new URL(document.referrer).origin;
                    } catch (_) {}
                } else if (window.location.origin && (window.location.origin.includes("localhost") || window.location.origin.includes("127.0.0.1")) && !window.location.origin.includes("8080")) {
                    parentOrigin = window.location.origin;
                }
                setDashboardUrl(parentOrigin + "/?page=auth");

                return () => clearTimeout(timer);
            }, []);

            // Track scroll to swap navbars
            useEffect(() => {
                const handleScroll = () => {
                    setScrollY(window.scrollY);
                };
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            // Desktop Mouse Video Scrubbing Hook
            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                const handleMouseMove = (e) => {
                    if (window.innerWidth < 1024) return; // Ignore on mobile
                    if (!video.duration) return;

                    if (prevX.current === null) {
                        prevX.current = e.clientX;
                        return;
                    }

                    const deltaX = e.clientX - prevX.current;
                    prevX.current = e.clientX;

                    // Scrub delta logic
                    const timeDelta = (deltaX / window.innerWidth) * 0.8 * video.duration;
                    let targetTime = video.currentTime + timeDelta;
                    targetTime = Math.max(0, Math.min(video.duration, targetTime));
                    
                    video.currentTime = targetTime;
                };

                window.addEventListener("mousemove", handleMouseMove);
                return () => {
                    window.removeEventListener("mousemove", handleMouseMove);
                };
            }, []);

            // Mobile Autoplay Hook
            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                if (window.innerWidth < 1024) {
                    video.autoplay = true;
                    video.loop = true;
                    video.muted = true;
                    video.play().catch(() => {});
                }
            }, []);

            const toggleAgent = (agent) => {

                    prev.includes(agent)
                        ? prev.filter((a) => a !== agent)

                );

            const typewriter = useTypewriter("we'd love to\nhear your feedback!", 38, 600);

                            aria-label="Sentinel floating navigation"
                        >
                            <a href="#hero" className="text-foreground text-xs font-bold tracking-widest uppercase flex items-center gap-2" aria-label="Enterprise Council AI Homepage">
                                <Shield className="text-primary w-4.5 h-4.5" /> Enterprise Council AI
                            </a>
                            <div className="hidden lg:flex gap-6 items-center">
                                {["Problem", "Solution", "How It Works", "Metrics", "Team"].map((link) => (
                                    <a

                                        {link}

                                ))}
                                <span className="text-muted-foreground/35">|</span>
                                <a

                                    aria-label="Open API Documentation in a new tab"
                                >
                                    API Docs
                                </a>
                            </div>
                            <a 
                                href={dashboardUrl} 
                                target={linkTarget}
                                className="hidden lg:inline-flex items-center justify-center rounded-full uppercase text-[10px] tracking-widest px-5 py-2 font-semibold text-foreground bg-nav-button hover:bg-nav-button/80 active:scale-[0.97] transition-all border border-white/5"
